name: Post Automático

on:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests openai

      - name: Gerar post
        run: python gerar_post.py

      - name: Commit e push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@email.com"
          git add .
          git commit -m "novo post automático"
          git push
